server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Max upload size (matches PHP config)
    client_max_body_size 12m;

    # Gzip
    gzip on;
    gzip_types text/html text/css text/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Static assets (long cache)
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Font files
    location /assets/webfonts/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Image files (served from data volume)
    location /images/ {
        alias /data/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP dynamic requests
    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # API root (redirect to PHP files)
    location /api/ {
        try_files $uri $uri/ /index.html;
    }

    # Prevent access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent access to config and source
    location ~ \.(md|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Frontend SPA - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
